<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Capybara clicker</title>
    <link rel="stylesheet" href="./style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Russo+One&display=swap" rel="stylesheet">
</head>
<body>
    <div class="wrapper">
        <header>
            <div class="score">
                <h2 class="score__heading">Очки:</h2>
                <span class="score__number">0</span>
            </div>
            <div class="heading">
                <h1>Кликер капибары</h1>
            </div>
        </header>
        <main>
            <div class="image">
                <div class="img">
                    <img src="./img/capybara.png" alt="Капибара" class="capybara">
                </div>
                <div class="combo-1"></div>
                <div class="combo-2"></div>
                <div class="click"></div>
            </div>
        </main>
    </div>
    <script src="./ts-dist/script.js"></script>
</body>
</html>
